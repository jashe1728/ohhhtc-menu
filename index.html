<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4A6494">
<title>OhhhTC!!!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #4A6494;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    padding: 32px 20px calc(32px + env(safe-area-inset-bottom, 0));
  }

  .card {
    background: #FDFAF4;
    border-radius: 24px;
    padding: 40px 28px 36px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(27,43,75,.28);
  }

  .logo {
    width: 96px; height: 96px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 20px;
    box-shadow: 0 0 0 3px rgba(137,196,225,.5), 0 6px 24px rgba(27,43,75,.2);
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: #1B2B4B;
    line-height: 1;
    margin-bottom: 6px;
  }
  .brand em { font-style: italic; color: #89C4E1; }

  .tagline {
    font-size: .78rem;
    color: #6B7280;
    margin-bottom: 32px;
    font-style: italic;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 20px;
    border-radius: 14px;
    text-decoration: none;
    font-size: .9rem;
    font-weight: 500;
    transition: transform .2s cubic-bezier(.4,0,.2,1), box-shadow .2s;
    position: relative;
    overflow: hidden;
    border: none;
    cursor: pointer;
  }
  .link-btn:active { transform: scale(.97); }

  .link-btn .icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1.2rem;
  }

  .link-btn .text {
    display: flex; flex-direction: column; align-items: flex-start;
  }
  .link-btn .text-main { font-weight: 600; font-size: .88rem; }
  .link-btn .text-sub  { font-size: .72rem; opacity: .7; margin-top: 1px; }

  /* TheFork — green */
  .btn-thefork {
    background: #F0FBF6;
    color: #0A6640;
    box-shadow: 0 2px 12px rgba(10,102,64,.1);
  }
  .btn-thefork .icon { background: #0A6640; color: #fff; }
  .btn-thefork:hover { box-shadow: 0 6px 20px rgba(10,102,64,.18); transform: translateY(-2px); }

  /* Menu — navy */
  .btn-menu {
    background: #4A6494;
    color: #FDFAF4;
    box-shadow: 0 2px 12px rgba(74,100,148,.25);
  }
  .btn-menu .icon { background: rgba(255,255,255,.15); color: #fff; }
  .btn-menu:hover { box-shadow: 0 6px 20px rgba(74,100,148,.35); transform: translateY(-2px); }
  .btn-menu .text-sub { opacity: .6; }

  /* Google — white */
  .btn-google {
    background: #fff;
    color: #1a1a1a;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    border: 1px solid rgba(27,43,75,.08);
  }
  .btn-google .icon { background: #f5f5f5; }
  .btn-google:hover { box-shadow: 0 6px 20px rgba(0,0,0,.13); transform: translateY(-2px); }

  /* Instagram — gradient */
  .btn-instagram {
    background: linear-gradient(135deg, #fdf0f8 0%, #f0f4ff 100%);
    color: #6c2d8a;
    box-shadow: 0 2px 12px rgba(193,53,132,.1);
  }
  .btn-instagram .icon {
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    color: #fff;
  }
  .btn-instagram:hover { box-shadow: 0 6px 20px rgba(193,53,132,.2); transform: translateY(-2px); }

  .footer {
    margin-top: 28px;
    font-size: .68rem;
    color: #9CA3AF;
  }

  /* Google icon SVG inline */
  .google-svg { width: 20px; height: 20px; }
</style>
</head>
